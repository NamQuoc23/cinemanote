<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinema Note</title>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-MCGTDW2WCW"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

</script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500&family=Source+Sans+3:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --surface: #ffffff;
    --ink: #000000;
    --ink-mid: #6b6559;
    --ink-dim: #b0a99e;
    --rule: #000000;
    --gold: #9a7f52;
    --page-gutter: clamp(40px, 10vw, 168px);
    --content-width: 900px;
    --mono: 'Source Sans 3', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  .view-shell {
    transition: opacity 0.28s ease, transform 0.28s ease;
  }

  .view-shell.is-transitioning {
    opacity: 0;
    transform: translateY(10px);
  }

  /* ===== NAV ===== */
  header {
    background: #ffffff;
    padding: 0 var(--page-gutter);
    height: 96px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 24px;
  }

  .header-signature {
    justify-self: start;
    display: flex;
    align-items: center;
  }

  .header-signature img {
    height: 58px;
    width: auto;
    display: block;
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.45rem;
    font-weight: 400;
    letter-spacing: 0.06em;
    color: var(--ink);
    justify-self: center;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
  }

  .logo:hover {
    opacity: 0.68;
  }

  .header-meta {
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    color: var(--ink);
    text-transform: uppercase;
    justify-self: end;
    visibility: hidden;
  }

  /* ===== HERO ===== */
  .hero {
    padding: 92px 0 34px;
    width: min(var(--content-width), calc(100vw - (var(--page-gutter) * 2)));
    margin: 0 auto;
  }

  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.8rem, 5vw, 4rem);
    font-weight: 300;
    line-height: 1.05;
    letter-spacing: -0.01em;
    margin-bottom: 20px;
  }

  .hero-title em {
    font-style: italic;
    color: var(--ink);
  }

  .hero-sub {
    font-size: 0.85rem;
    font-weight: 300;
    color: var(--ink);
    line-height: 1.75;
    max-width: 620px;
  }

  /* ===== CONTROLS ===== */
  .controls {
    padding: 12px 0 0;
    display: flex;
    align-items: center;
    gap: 18px;
    justify-content: space-between;
    flex-wrap: wrap;
    width: min(var(--content-width), calc(100vw - (var(--page-gutter) * 2)));
    margin: 0 auto;
  }

  .filter-group {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .filter-btn {
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    color: var(--ink);
    background: #ffffff;
    border: 1px solid #d9d9d9;
    padding: 10px 14px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, color 0.15s;
  }

  .filter-btn:hover {
    border-color: var(--ink);
  }

  .filter-btn.active {
    background: var(--ink);
    border-color: var(--ink);
    color: #ffffff;
  }

  .search-wrap {
    width: min(100%, 340px);
  }

  .search-input {
    width: 100%;
    font-family: var(--mono);
    font-size: 0.78rem;
    font-weight: 400;
    letter-spacing: 0.03em;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid #d9d9d9;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }

  .search-input::placeholder { color: rgba(0, 0, 0, 0.45); }
  .search-input:focus { border-color: var(--ink); }

  .count-label {
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    color: var(--ink);
    text-transform: uppercase;
  }

  /* ===== GRID ===== */
  .films-wrap {
    padding: 42px var(--page-gutter) 104px;
  }

  .section-rule {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 42px;
    max-width: var(--content-width);
    margin-left: auto;
    margin-right: auto;
  }

  .section-rule-label {
    font-family: var(--mono);
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    color: var(--ink);
    text-transform: uppercase;
    white-space: nowrap;
  }

  .section-rule-line {
    flex: 1;
    height: 1px;
    background: var(--rule);
  }

  .film-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 52px 44px;
    align-items: start;
    max-width: var(--content-width);
    margin: 0 auto;
  }

  /* ===== CARD ===== */
  .film-card {
    cursor: pointer;
    animation: riseIn 0.5s ease both;
  }

  .film-card:hover .poster-img { transform: scale(1.03); }
  .film-card:hover .card-overlay { opacity: 1; }

  .poster-frame {
    aspect-ratio: 2/3;
    overflow: hidden;
    background: var(--rule);
    position: relative;
    margin-bottom: 14px;
  }

  .poster-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    transition: transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94);
    display: block;
  }

  .poster-fallback {
    width: 100%;
    height: 100%;
    background: linear-gradient(160deg, #ede9e0 0%, #ddd8ce 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    color: var(--ink-dim);
  }

  .card-overlay {
    position: absolute;
    inset: 0;
    background: rgba(26,24,20,0.5);
    opacity: 0;
    transition: opacity 0.25s;
    display: flex;
    align-items: flex-end;
    padding: 16px;
  }

  .card-overlay-text {
    font-family: var(--mono);
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(248,246,241,0.8);
  }

  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    font-weight: 400;
    line-height: 1.25;
    margin-bottom: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-meta {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--ink-dim);
    letter-spacing: 0.05em;
    line-height: 1.7;
  }

  /* ===== DETAIL ===== */
  .hidden {
    display: none !important;
  }

  .detail-view {
    padding: 42px var(--page-gutter) 104px;
  }

  .detail-shell {
    width: min(var(--content-width), calc(100vw - (var(--page-gutter) * 2)));
    margin: 0 auto;
  }

  .detail-back {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink);
    text-decoration: none;
    margin-bottom: 32px;
  }

  .detail-back:hover {
    opacity: 0.65;
  }

  .detail-article::after {
    content: "";
    display: block;
    clear: both;
  }

  .detail-poster {
    width: min(300px, 32vw);
    aspect-ratio: 2 / 3;
    overflow: hidden;
    background: #f1f1f1;
    float: left;
    margin: 0 40px 24px 0;
  }

  .detail-poster img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center center;
    display: block;
    background: #ffffff;
  }

  .detail-poster-fallback {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 5rem;
    color: var(--ink-dim);
  }

  .detail-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 14px;
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-mid);
  }

  .detail-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 4vw, 2.8rem);
    font-weight: 400;
    line-height: 1.1;
    margin-bottom: 10px;
  }

  .detail-director {
    font-size: 0.82rem;
    font-weight: 300;
    color: var(--ink-mid);
    margin-bottom: 24px;
  }

  .detail-review {
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 300;
    font-style: normal;
    line-height: 1.95;
    color: var(--ink);
    text-align: justify;
    text-justify: inter-word;
  }

  .detail-review p {
    margin: 0 0 22px;
  }

  .detail-review p:last-child {
    margin-bottom: 0;
  }

  .detail-review-image {
    display: block;
    width: min(100%, 720px);
    margin: 30px auto;
    background: #ffffff;
  }

  .detail-review-image img {
    display: block;
    width: 100%;
    height: auto;
  }

  .detail-review-empty {
    font-size: 0.8rem;
    color: var(--ink-dim);
    font-style: normal;
  }

  /* ===== LOADING / EMPTY ===== */
  .state-wrap {
    padding: 80px 56px;
    text-align: center;
    max-width: var(--content-width);
    margin: 0 auto;
  }

  .loading-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 300;
    font-style: italic;
    color: var(--ink-dim);
    animation: pulse 1.5s ease-in-out infinite;
  }

  .empty-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 300;
    font-style: italic;
    color: var(--ink-dim);
    margin-bottom: 8px;
  }

  .empty-sub {
    font-size: 0.8rem;
    color: var(--ink-dim);
    font-weight: 300;
  }

  .error-msg {
    font-size: 0.82rem;
    color: #c04040;
    font-weight: 300;
    max-width: 400px;
    margin: 0 auto;
    line-height: 1.7;
  }

  @keyframes riseIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 980px) {
    header {
      height: auto;
      min-height: 88px;
      padding-top: 12px;
      padding-bottom: 12px;
    }

    .header-signature img {
      height: 50px;
    }

    .film-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 40px 32px;
    }

  }

  @media (max-width: 680px) {
    :root {
      --page-gutter: 22px;
    }

    header {
      grid-template-columns: 1fr 1fr;
      align-items: center;
      gap: 16px;
      height: 78px;
      padding-top: 0;
      padding-bottom: 0;
    }

    .header-signature {
      justify-self: start;
    }

    .header-signature img {
      height: 42px;
    }

    .logo {
      justify-self: end;
      font-size: 1.2rem;
    }

    .header-meta {
      display: none;
    }

    .hero { padding-top: 56px; padding-bottom: 30px; }
    .controls {
      padding-top: 8px;
      padding-bottom: 0;
      width: calc(100vw - (var(--page-gutter) * 2));
      align-items: stretch;
    }
    .filter-group {
      gap: 8px;
    }
    .filter-btn {
      padding: 9px 12px;
    }
    .films-wrap { padding-top: 36px; padding-bottom: 64px; }
    .film-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 30px 22px;
    }
    .detail-view { padding-top: 36px; padding-bottom: 64px; }
    .detail-poster {
      max-width: 320px;
      width: min(100%, 320px);
      float: none;
      margin: 0 auto 24px;
    }
    .detail-title { font-size: 1.7rem; }
    .state-wrap { padding: 60px 20px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-signature">
    <img src="ChuKyTayNamQuoc.png" alt="Chữ ký Nam Quốc">
  </div>
  <a href="/" class="logo" onclick="goHome(event)">Cinema Note</a>
  <span class="header-meta" id="headerMeta">—</span>
</header>

<main id="homeView" class="view-shell">
  <!-- HERO -->
  <section class="hero">
    <h1 class="hero-title">Some films stay<br><em>longer than the story.</em></h1>
    <p class="hero-sub">Tuyển chọn những bộ phim mình đã xem, phân tích và trân trọng — ghi lại không phải để nhớ, mà để hiểu.</p>
  </section>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="filter-group" id="filterGroup">
      <button class="filter-btn active" type="button" data-filter="all" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" type="button" data-filter="From Home" onclick="setFilter('From Home', this)">From Home</button>
      <button class="filter-btn" type="button" data-filter="From the World" onclick="setFilter('From the World', this)">From the World</button>
      <button class="filter-btn" type="button" data-filter="Notes" onclick="setFilter('Notes', this)">Notes</button>
    </div>
    <div class="search-wrap">
      <input class="search-input" type="text" placeholder="Tìm phim, đạo diễn..." id="searchInput" oninput="renderFilms()">
    </div>
  </div>

  <!-- FILMS -->
  <div class="films-wrap">
    <div class="section-rule">
      <span class="section-rule-label" id="sectionLabel">Đang tải</span>
      <div class="section-rule-line"></div>
    </div>

    <div id="stateWrap" class="state-wrap" style="display:none"></div>
    <div class="film-grid" id="filmGrid"></div>
  </div>
</main>

<section class="detail-view hidden view-shell" id="detailView">
  <div class="detail-shell">
    <a href="/" class="detail-back" onclick="goHome(event)">← Trở lại danh sách</a>
    <div id="detailBody"></div>
  </div>
</section>

<script>
const SHEET_ID = '1LbDjx4rmHLD5RO9OR0e6r9SqHxn-3Pwmqx5KNZia_ls';
const API_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Sheet1`;
const GA_MEASUREMENT_ID = 'G-MCGTDW2WCW';

let allFilms = [];
let activeFilter = 'all';
let isTransitioningView = false;
let lastTrackedPath = '';
let currentReviewSlug = null;
let currentReviewTitle = '';
let currentReviewEnterAt = 0;

// ===== FETCH =====
async function fetchFilms() {
  showState('loading', 'Đang tải...');
  try {
    const res = await fetch(API_URL);
    const text = await res.text();
    // Google wraps JSON in /*O_o*/google.visualization.Query.setResponse(...)
    const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
    const rows = json.table.rows;
    const cols = json.table.cols.map(c => c.label.toLowerCase().trim());

    allFilms = rows.map(row => {
      const obj = {};
      cols.forEach((col, i) => {
        obj[col] = row.c[i]?.v ?? '';
      });
      obj._slug = slugify(obj.title || '', allFilms.length);
      return obj;
    }).filter(f => f.title);

    allFilms = allFilms.map((film, index) => ({
      ...film,
      _slug: slugify(film.title || '', index)
    }));

    updateHeaderMeta();
    syncFilterButtons();
    renderRoute();
  } catch (e) {
    showState('error', 'Không thể tải dữ liệu. Hãy kiểm tra lại cài đặt chia sẻ của Google Sheet.');
    console.error(e);
  }
}

// ===== RENDER =====
function slugify(text, index) {
  const base = String(text)
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '');
  return `${base || 'film'}-${index + 1}`;
}

function getFilmFromUrl() {
  const params = new URLSearchParams(window.location.search);
  return params.get('film');
}

function getFilmBySlug(slug) {
  return allFilms.find(film => film._slug === slug);
}

function syncFilterButtons() {
  document.querySelectorAll('.filter-btn').forEach(button => {
    button.classList.toggle('active', button.dataset.filter === activeFilter);
  });
}

function setFilter(filter, btn) {
  activeFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(button => button.classList.remove('active'));
  btn.classList.add('active');
  renderFilms();
}

function renderRoute() {
  if (isTransitioningView) return;
  const slug = getFilmFromUrl();
  const film = slug ? getFilmBySlug(slug) : null;

  if (slug && film) {
    switchView(() => renderDetailPage(film));
    return;
  }

  if (slug && !film) {
    history.replaceState({}, '', window.location.pathname);
  }

  switchView(renderHomePage);
}

function renderHomePage() {
  endReviewSession('return_home');
  document.getElementById('homeView').classList.remove('hidden');
  document.getElementById('detailView').classList.add('hidden');
  document.title = 'Cinema Note';
  renderFilms();
  trackVirtualPageView('/', 'Cinema Note');
}

function renderFilms() {
  const search = document.getElementById('searchInput').value.toLowerCase();

  let filtered = allFilms.filter(f => {
    const filmFilter = (f.filter || '').trim();
    const matchFilter = activeFilter === 'all' || filmFilter === activeFilter;
    const matchSearch = !search ||
      (f.title || '').toLowerCase().includes(search) ||
      (f.director || '').toLowerCase().includes(search);
    return matchFilter && matchSearch;
  });

  const sectionPrefix = activeFilter === 'all' ? 'Tất cả phim' : activeFilter;
  document.getElementById('sectionLabel').textContent = sectionPrefix + ' · ' + filtered.length;

  const grid = document.getElementById('filmGrid');

  if (filtered.length === 0) {
    grid.innerHTML = '';
    showState('empty', 'Không tìm thấy phim nào');
    return;
  }

  hideState();
  grid.innerHTML = filtered.map((f, i) => `
    <div class="film-card" style="animation-delay:${Math.min(i,12)*0.04}s" onclick="openFilm('${f._slug}')">
      <div class="poster-frame">
        ${f.poster
          ? `<img class="poster-img" src="${f.poster}" alt="${f.title}" loading="lazy" onerror="this.parentNode.innerHTML='<div class=\\'poster-fallback\\'>🎬</div>'">`
          : `<div class="poster-fallback">🎬</div>`}
        <div class="card-overlay">
          <span class="card-overlay-text">Đọc cảm nhận</span>
        </div>
      </div>
      <div class="card-title">${f.title}</div>
      <div class="card-meta">
        ${f.director || ''}${f.director && f.year ? ' · ' : ''}${f.year || ''}
        ${f.runtime ? '<br>' + f.runtime : ''}
      </div>
    </div>
  `).join('');
}

function openFilm(slug) {
  const film = getFilmBySlug(slug);
  const url = new URL(window.location.href);
  url.searchParams.set('film', slug);
  history.pushState({}, '', url);
  trackPosterClick(film);
  renderRoute();
}

function goHome(event) {
  if (event) event.preventDefault();
  history.pushState({}, '', window.location.pathname);
  renderRoute();
}

function getVisibleView() {
  return document.getElementById('homeView').classList.contains('hidden')
    ? document.getElementById('detailView')
    : document.getElementById('homeView');
}

function switchView(renderNext) {
  const currentView = getVisibleView();
  isTransitioningView = true;
  currentView.classList.add('is-transitioning');

  window.setTimeout(() => {
    renderNext();
    const nextView = getVisibleView();
    nextView.classList.add('is-transitioning');

    requestAnimationFrame(() => {
      nextView.classList.remove('is-transitioning');
      window.setTimeout(() => {
        currentView.classList.remove('is-transitioning');
        isTransitioningView = false;
      }, 280);
    });
  }, 180);
}

function renderDetailPage(film) {
  if (currentReviewSlug && currentReviewSlug !== film._slug) {
    endReviewSession('switch_film');
  }

  const metaBits = [film.year, film.runtime].filter(Boolean);
  document.getElementById('homeView').classList.add('hidden');
  document.getElementById('detailView').classList.remove('hidden');
  document.title = `${film.title} • Cinema Note`;

  document.getElementById('detailBody').innerHTML = `
    <article class="detail-article">
      <div class="detail-poster">
        ${film.poster
          ? `<img src="${film.poster}" alt="${film.title}" onerror="this.parentNode.innerHTML='<div class=\\'detail-poster-fallback\\'>🎬</div>'">`
          : `<div class="detail-poster-fallback">🎬</div>`}
      </div>
      <div class="detail-meta">
        ${metaBits.map(bit => `<span>${bit}</span>`).join('<span style="opacity:.5">·</span>')}
      </div>
      <div class="detail-title">${film.title}</div>
      ${film.director ? `<div class="detail-director">Đạo diễn: ${film.director}</div>` : ''}
      ${film.review
        ? `<div class="detail-review">${formatReview(film.review)}</div>`
        : `<div class="detail-review-empty">Chưa có cảm nhận.</div>`}
    </article>
  `;

  trackVirtualPageView(`/?film=${film._slug}`, `${film.title} • Cinema Note`);
  startReviewSession(film);
}

function formatReview(review) {
  return String(review)
    .split(/\n\s*\n/)
    .map(block => block.trim())
    .filter(Boolean)
    .map(block => {
      const imageMatch = block.match(/^\[image:\s*(https?:\/\/[^\s\]]+)\s*\]$/i);
      if (imageMatch) {
        const url = imageMatch[1];
        return `<figure class="detail-review-image"><img src="${url}" alt="Hình minh họa trong bài viết" loading="lazy"></figure>`;
      }
      return `<p>${block.replace(/\n/g, '<br>')}</p>`;
    })
    .join('');
}

window.addEventListener('popstate', renderRoute);

// ===== STATE =====
function showState(type, msg) {
  const wrap = document.getElementById('stateWrap');
  document.getElementById('filmGrid').innerHTML = '';
  wrap.style.display = 'block';
  if (type === 'loading') {
    wrap.innerHTML = `<div class="loading-text">${msg}</div>`;
  } else if (type === 'empty') {
    wrap.innerHTML = `<div class="empty-title">${msg}</div><p class="empty-sub">Thử tìm kiếm với từ khóa khác.</p>`;
  } else {
    wrap.innerHTML = `<div class="empty-title">Oops</div><p class="error-msg">${msg}</p>`;
  }
}

function hideState() {
  document.getElementById('stateWrap').style.display = 'none';
}

function updateHeaderMeta() {
  document.getElementById('headerMeta').textContent = allFilms.length + ' phim';
}

function trackVirtualPageView(path, title) {
  if (typeof window.gtag !== 'function') return;
  if (lastTrackedPath === path) return;
  lastTrackedPath = path;
  window.gtag('event', 'page_view', {
    page_title: title,
    page_location: `${window.location.origin}${path}`,
    page_path: path,
    send_to: GA_MEASUREMENT_ID
  });
}

function trackPosterClick(film) {
  if (typeof window.gtag !== 'function' || !film) return;
  window.gtag('event', 'select_content', {
    content_type: 'film_poster',
    item_id: film._slug,
    item_name: film.title || '',
    film_filter: (film.filter || '').trim(),
    director: film.director || '',
    send_to: GA_MEASUREMENT_ID
  });
}

function startReviewSession(film) {
  if (!film) return;
  if (currentReviewSlug === film._slug) return;
  currentReviewSlug = film._slug;
  currentReviewTitle = film.title || '';
  currentReviewEnterAt = Date.now();
}

function endReviewSession(reason) {
  if (!currentReviewSlug || !currentReviewEnterAt) return;
  const durationMs = Date.now() - currentReviewEnterAt;
  const durationSeconds = Math.max(1, Math.round(durationMs / 1000));

  if (typeof window.gtag === 'function') {
    window.gtag('event', 'review_read', {
      item_id: currentReviewSlug,
      item_name: currentReviewTitle,
      duration_seconds: durationSeconds,
      exit_reason: reason,
      transport_type: 'beacon',
      send_to: GA_MEASUREMENT_ID
    });
  }

  currentReviewSlug = null;
  currentReviewTitle = '';
  currentReviewEnterAt = 0;
}

window.addEventListener('pagehide', () => {
  endReviewSession('pagehide');
});

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') {
    endReviewSession('hidden_tab');
    return;
  }

  const slug = getFilmFromUrl();
  const film = slug ? getFilmBySlug(slug) : null;
  if (document.visibilityState === 'visible' && film) {
    startReviewSession(film);
  }
});

fetchFilms();
</script>
